name: Deploy TEMPEST portal

# Same deploy shape as the SignalDelta portal: GitHub Actions -> GitHub Pages,
# with the proxy URL + bearer token injected at deploy time from repo SECRETS
# (never committed). The portal is static (no build step) — Actions writes
# config.js from the secrets, then publishes the folder to Pages.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # No secret injection: config.js is committed and token-free (it only holds
      # the public Netlify forwarder URL). The bearer token lives server-side in
      # the Netlify function's STORM_PROXY_TOKEN env var — never in this build.
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: "."
      - id: deployment
        uses: actions/deploy-pages@v4
